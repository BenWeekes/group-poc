services:
  tools:
    build: ./tools
    environment:
      PORT: 8111
      INTERNAL_TOOL_SECRET: ${INTERNAL_TOOL_SECRET:?set INTERNAL_TOOL_SECRET}
      DATA_FILE: /app/data/accounts.runtime.json
    volumes:
      - ./tools/data:/app/data
    expose:
      - "8111"
    restart: unless-stopped

  custom-llm:
    build: ./custom-llm
    environment:
      PORT: 8110
      TOOLS_BASE_URL: http://tools:8111
      INTERNAL_TOOL_SECRET: ${INTERNAL_TOOL_SECRET:?set INTERNAL_TOOL_SECRET}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROUP_POC_API_KEY: ${GROUP_POC_API_KEY:?set GROUP_POC_API_KEY}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-1800000}
    depends_on:
      - tools
    ports:
      - "127.0.0.1:8110:8110"
    restart: unless-stopped
