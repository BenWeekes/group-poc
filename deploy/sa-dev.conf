server {
    listen 80;
    listen [::]:80;
    server_name sa-dev.agora.io;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sa-dev.agora.io;
    ssl_certificate /etc/letsencrypt/live/sa-dev.agora.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sa-dev.agora.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 2m;
    # AI-commentator experiment pages (static) — additive; does NOT touch the app proxy below
    location /experiments/ {
        root /var/www/html;
        autoindex on;
    }
    location = /vte_submit { proxy_pass http://127.0.0.1:8091/submit; proxy_read_timeout 15s; }
    location = /blend_feedback { proxy_pass http://127.0.0.1:8091/blend_feedback; proxy_read_timeout 15s; }
    location = /blend_rounds   { proxy_pass http://127.0.0.1:8091/blend_rounds;   proxy_read_timeout 15s; }
    location = /blend_trigger  { proxy_pass http://127.0.0.1:8091/blend_trigger;  proxy_read_timeout 15s; }
    # Group POC Custom LLM. This narrow prefix is intentionally separate from
    # the existing root application on port 8095.
    location = /group-poc/llm {
        return 308 /group-poc/llm/;
    }
    location /group-poc/llm/ {
        proxy_pass http://127.0.0.1:8110/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
